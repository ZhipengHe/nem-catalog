name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write   # for PyPI trusted publishing
  issues: write     # for failure-notification issue creation

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/nem-catalog
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - run: uv sync --extra dev
      - run: uv run pytest
      - name: Build
        run: uv build
      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@6733eb7d741f0b11ec6a39b58540dab7590f9b7d # v1.14.0
        with:
          skip-existing: true

      - name: Open issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "release: ${{ github.ref_name }} failed to publish" \
            --body "release.yml failed during PyPI publish for tag \`${{ github.ref_name }}\`. See run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}. Note: PyPI rejects re-uploads of the same version, so re-running may not recover; you likely need a v0.x.y+1 patch release." \
            --label "release,p0"
