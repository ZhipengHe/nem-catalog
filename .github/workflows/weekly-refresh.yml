name: weekly-refresh

on:
  schedule:
    - cron: "0 3 * * 1"   # Mondays 03:00 UTC
  workflow_dispatch:       # manual trigger

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: nemweb-mirror-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Install project
        run: uv sync --extra dev

      # Test plan line 54: robots.txt halt check. Fails loudly before any crawl bytes go out.
      - name: Verify robots.txt permits our crawler
        id: robots
        continue-on-error: true
        run: uv run python scripts/check_robots.py

      - name: Halt + open issue if robots.txt disallows
        if: steps.robots.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "robots.txt halt: $(date -u +%Y-%m-%dT%H:%MZ)" \
            --body "NEMWEB robots.txt now disallows one or more paths our crawler visits. Workflow halted. See workflow run for details. Coordinate with AEMO per \`docs/aemo-coordination.md\` before re-enabling." \
            --label "aemo-coordination,robots-halt"
          exit 1

      - name: Record crawl-attempted timestamp
        id: crawl_attempted
        run: |
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "LAST_CRAWL_ATTEMPTED_AT=$TS" >> $GITHUB_ENV
          echo "ts=$TS" >> $GITHUB_OUTPUT

      - name: Crawl NEMWEB (policy-driven)
        id: crawl
        continue-on-error: true
        run: |
          set -eo pipefail
          uv run python -m scripts.nemweb_download \
            --policy patterns/curated/freshness-policy.yaml \
            10000 \
            2>&1 | tee nemweb-mirror/download.log
          FAILED=$(grep -c "status=" nemweb-mirror/download.log || true)
          TOTAL=$(grep -c "fetch\[" nemweb-mirror/download.log || true)
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT

      - name: Open P0 issue if crawl step failed
        if: steps.crawl.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "weekly-refresh: crawl step failed $(date -u +%Y-%m-%dT%H:%MZ)" \
            --body "scripts/nemweb_download.py exited non-zero (exit 2 indicates PolicyLoadError or HREFExtractionShiftError; see run log). extract/merge/PR are skipped and the previously-published catalog keeps serving. Investigate, patch, and re-trigger via workflow_dispatch." \
            --label "weekly-refresh,crawl-failure,p0"
          exit 1

      - name: Record crawl-completed timestamp
        if: steps.crawl.outcome == 'success'
        run: |
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "LAST_CRAWL_COMPLETED_AT=$TS" >> $GITHUB_ENV

      - name: Check WAF / block indicators (>5% non-200)
        id: block_check
        if: steps.crawl.outcome == 'success'
        run: |
          FAILED=${{ steps.crawl.outputs.failed }}
          TOTAL=${{ steps.crawl.outputs.total }}
          if [ "$TOTAL" -gt 0 ]; then
            PCT=$(( 100 * FAILED / TOTAL ))
            echo "Failure rate: $PCT%"
            if [ "$PCT" -gt 5 ]; then
              echo "blocked=true" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Open GH issue if blocked
        if: steps.crawl.outcome == 'success' && steps.block_check.outputs.blocked == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "crawl blocked: $(date -u +%Y-%m-%dT%H:%MZ) — ${{ steps.crawl.outputs.failed }}/${{ steps.crawl.outputs.total }} non-200" \
            --body "The weekly crawl encountered a high rate of non-200 responses. See workflow run for details. Catalog continues serving last-good artifact until this is resolved." \
            --label "aemo-coordination,bug"
          exit 1

      - name: Regenerate auto patterns
        if: steps.crawl.outcome == 'success'
        run: uv run python -m scripts.extract_patterns --policy patterns/curated/freshness-policy.yaml

      - name: Merge catalog
        id: merge
        if: steps.crawl.outcome == 'success'
        continue-on-error: true
        run: |
          uv run python scripts/merge_catalog.py \
            --auto patterns/auto/catalog.json \
            --curated patterns/curated/ \
            --out catalog.json

      - name: Open issue if merge step failed
        if: steps.crawl.outcome == 'success' && steps.merge.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "weekly-refresh: merge_catalog.py failed ($(date -u +%Y-%m-%dT%H:%MZ))" \
            --body "merge_catalog.py exited non-zero. The auto-extracted patterns and/or curated overlays produced an invalid merge. See workflow run for details. Catalog continues serving last-good artifact until this is resolved." \
            --label "weekly-refresh,merge,p0"
          exit 1

      # Design line 320: bump the README crawl badge only after every preceding step succeeded.
      - name: Update README crawl badge
        if: steps.crawl.outcome == 'success'
        run: |
          chmod +x scripts/update_crawl_badge.sh
          bash scripts/update_crawl_badge.sh

      # Test plan line 55: dataset-level before/after in PR body with threshold flag.
      - name: Compute dataset diff for PR body
        id: dataset_diff
        if: steps.crawl.outcome == 'success'
        run: |
          {
            echo 'body<<DIFF_EOF'
            uv run python scripts/dataset_diff.py
            echo 'DIFF_EOF'
          } >> $GITHUB_OUTPUT

      - name: Detect diff
        id: diff
        if: steps.crawl.outcome == 'success'
        run: |
          if git diff --quiet nemweb-mirror/ patterns/auto/ catalog.json README.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Compute refresh date
        id: refresh_date
        if: steps.crawl.outcome == 'success' && steps.diff.outputs.changed == 'true'
        run: echo "date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Create PR on changes
        if: steps.crawl.outcome == 'success' && steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: "chore(data): weekly catalog refresh"
          title: "chore(data): weekly catalog refresh (${{ steps.refresh_date.outputs.date }})"
          body: |
            Weekly auto-refresh from `weekly-refresh.yml`.

            ${{ steps.dataset_diff.outputs.body }}

            ### Reviewer checklist

            - [ ] Any new datasets that need a `patterns/curated/` overlay?
            - [ ] Any anomaly warnings worth human judgment?
            - [ ] Any dropped datasets — deprecation note needed?
            - [ ] Merge warnings from the workflow logs resolved?
            - [ ] Dataset-diff threshold (>=5%) acknowledged if warning present?
          branch: weekly-refresh-${{ github.run_id }}
          labels: weekly-refresh,data-catalog
